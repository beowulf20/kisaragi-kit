---
name: release

"on":
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Format
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

      - name: Staticcheck
        uses: dominikh/staticcheck-action@v1

  release:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'push' }}
    env:
      RELEASE_BRANCH: release-please--branches--master
    steps:
      - name: Check release token
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "::error::Set RELEASE_PLEASE_TOKEN to a PAT."
            echo "::error::PRs, merges, tags need follow-up workflows."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Clean stale release artifacts
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          open_release_prs="$(gh pr list --state open --json number,headRefName \
            --jq '[.[] | select(.headRefName == env.RELEASE_BRANCH)] | length')"

          if [ "$open_release_prs" != "0" ]; then
            echo "Open release PR exists for $RELEASE_BRANCH; keeping branch."
            exit 0
          fi

          ref_path="/repos/${GITHUB_REPOSITORY}/git/refs/heads/${RELEASE_BRANCH}"
          if gh api "$ref_path" >/dev/null 2>&1; then
            echo "Deleting stale release branch $RELEASE_BRANCH."
            gh api -X DELETE "$ref_path"
          else
            echo "No stale release branch found."
          fi

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: go
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Clean release artifacts after failure
        if: ${{ failure() && steps.release.outcome == 'failure' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          gh pr list --state open --json number,headRefName \
            --jq '.[] | select(.headRefName == env.RELEASE_BRANCH) | .number' |
          while read -r pr_number; do
            if [ -n "$pr_number" ]; then
              gh pr close "$pr_number" --delete-branch \
                --comment "Closing stale release-please PR after release workflow failure."
            fi
          done

          ref_path="/repos/${GITHUB_REPOSITORY}/git/refs/heads/${RELEASE_BRANCH}"
          if gh api "$ref_path" >/dev/null 2>&1; then
            gh api -X DELETE "$ref_path"
          fi

      - name: Fetch release tag
        if: ${{ steps.release.outputs.release_created }}
        run: git fetch --force --tags

      - name: Run GoReleaser
        if: ${{ steps.release.outputs.release_created }}
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  auto-merge-release-pr:
    runs-on: ubuntu-latest
    needs: test
    env:
      RELEASE_BRANCH: release-please--branches--master
    if: >-
      ${{
        github.event_name == 'pull_request' &&
        startsWith(github.head_ref, 'release-please--branches--') &&
        github.event.pull_request.head.repo.full_name == github.repository
      }}
    steps:
      - name: Merge release PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --merge --delete-branch

      - name: Delete release branch if still present
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          ref_path="/repos/${GITHUB_REPOSITORY}/git/refs/heads/${RELEASE_BRANCH}"
          if gh api "$ref_path" >/dev/null 2>&1; then
            gh api -X DELETE "$ref_path"
          fi
